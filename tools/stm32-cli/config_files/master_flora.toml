title = "PHYsec Key Generation configuration file"

[metadata]
title = "FLoRa: Sequential fuzzy extractor based physical layer key generation for LPWAN"
title_alias = "FLoRa"
doi = "10.1016/j.future.2022.10.018"
link = "https://linkinghub.elsevier.com/retrieve/pii/S0167739X22003284"

[keygen]
